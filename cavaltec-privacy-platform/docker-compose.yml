services:
  db:
    image: postgres:16
    container_name: cavaltec-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
    container_name: cavaltec-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      HOME: /app/auth
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - azure_token_cache:/app/auth

  frontend:
    build:
      context: ./frontend
    container_name: cavaltec-frontend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - api
    ports:
      - "3000:80"

volumes:
  postgres_data:
  azure_token_cache:
